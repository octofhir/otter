name: test262-baseline

# Refresh `docs/new-engine/test262-baseline/main.{json,md}` after
# every push to `main`. The workflow commits the new baseline
# directly back to `main` so the diff target moves forward as the
# engine improves.
on:
  push:
    branches: [main]

concurrency:
  group: test262-baseline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  shard:
    name: shard ${{ matrix.shard }}/8
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: git submodule update --init --recursive vendor/test262
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p otter-test262
      - name: Run shard ${{ matrix.shard }}/8
        run: |
          mkdir -p reports
          bash scripts/test262-safe.sh \
            --shard ${{ matrix.shard }}/8 \
            --output reports/shard-${{ matrix.shard }}.json
        env:
          TIMEOUT_MS: "30000"
      - uses: actions/upload-artifact@v4
        with:
          name: baseline-shard-${{ matrix.shard }}
          path: reports/

  publish:
    needs: [shard]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          path: reports-raw
      - name: Flatten shard artifacts
        run: |
          mkdir -p reports
          find reports-raw -name 'shard-*.json' -exec cp {} reports/ \;
      - name: Merge shards into main baseline
        run: |
          cargo run --release -p otter-test262 -- merge \
            reports/shard-*.json \
            --output docs/new-engine/test262-baseline/main.json
      - name: Commit baseline
        run: |
          git config user.name  "otter-test262-bot"
          git config user.email "otter-test262-bot@users.noreply.github.com"
          git add docs/new-engine/test262-baseline/main.json \
                  docs/new-engine/test262-baseline/main.md
          if git diff --cached --quiet; then
            echo "baseline unchanged — nothing to commit"
            exit 0
          fi
          ENGINE_SHA=$(git rev-parse HEAD)
          TEST262_SHA=$(git -C vendor/test262 rev-parse HEAD)
          git commit -m "chore(test262): refresh baseline (engine ${ENGINE_SHA::7}, test262 ${TEST262_SHA::7})"
          git push origin HEAD:main
