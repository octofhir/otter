[workspace]
resolver = "3"
# Foundation phase (2026-04-26 onward, ADR-0001):
# the new engine lives in `crates-next/*`. The legacy stack under
# `crates/*` is reference-only and is intentionally excluded from the
# workspace build graph.
members = [
    "crates-next/otter-bytecode",
    "crates-next/otter-syntax",
    "crates-next/otter-compiler",
    "crates-next/otter-gc",
    "crates-next/otter-vm",
    "crates-next/otter-runtime",
    "crates-next/otter-test",
    "crates-next/otter-test262",
    "crates-next/otter-cli",
]
exclude = [
    "crates/*",
]

[workspace.package]
edition = "2024"
publish = false
license = "MIT"
rust-version = "1.85"

[workspace.dependencies]
# docs/new-engine/adr/0002-oxc-frontend.md.
oxc_allocator   = "0.127"
oxc_span        = "0.127"
oxc_syntax      = "0.127"
oxc_ast         = "0.127"
oxc_parser      = "0.127"
oxc_ast_visit   = "0.127"
oxc_diagnostics = "0.127"
oxc_codegen     = "0.127"
oxc_resolver    = "11.19"

# Errors and serialization.
thiserror   = "2"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
toml        = "0.9"

# CLI / diagnostics / tracing.
clap                = { version = "4", features = ["derive"] }
miette              = { version = "7", features = ["fancy"] }
tracing             = "0.1"
tracing-subscriber  = { version = "0.3", features = ["env-filter"] }
tokio               = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros"] }

# Collections / utilities.
smallvec    = "1"
indexmap    = "2"
# Lock-free MPMC channel: cross-thread microtask enqueue from the
# async runtime (fetch / timers / Promise.then completion handlers)
# back into the interpreter. The single-thread sync side stays on
# the plain VecDeque inside `MicrotaskQueue`.
crossbeam-channel = "0.5"

# Arbitrary-precision integers for `Value::BigInt`.
num-bigint  = "0.4"
num-traits  = "0.2"

temporal_rs = { version = "0.2.3", features = ["sys-local"] }

icu_collator = { version = "2.1", features = ["compiled_data"] }
icu_decimal  = { version = "2.1", features = ["compiled_data"] }
icu_datetime = { version = "2.1", features = ["compiled_data"] }
icu_locale   = { version = "2.1", features = ["compiled_data"] }
icu_calendar = { version = "2.1", features = ["compiled_data"] }
icu_experimental = { version = "0.5", features = ["compiled_data"] }
fixed_decimal = "0.7"
writeable     = "0.6"

regress     = { git = "https://github.com/octoshikari/regress", features = ["utf16"] }

# Benchmarks.
criterion   = { version = "0.8", features = ["html_reports"] }

# Workspace-internal crates.
otter-bytecode  = { path = "crates-next/otter-bytecode" }
otter-syntax    = { path = "crates-next/otter-syntax" }
otter-compiler  = { path = "crates-next/otter-compiler" }
otter-gc        = { path = "crates-next/otter-gc" }
otter-vm        = { path = "crates-next/otter-vm" }
otter-runtime   = { path = "crates-next/otter-runtime" }
otter-test      = { path = "crates-next/otter-test" }

[workspace.lints.rust]
unsafe_code         = "forbid"
missing_docs        = "deny"

[workspace.lints.clippy]
all                 = { level = "deny", priority = -1 }

# Optimized release profile for the new foundation engine.
[profile.release]
lto = "thin"
codegen-units = 1
strip = false
panic = "unwind"
opt-level = 3

# Fast release for development iteration.
[profile.release-fast]
inherits = "release"
lto = false
codegen-units = 16
strip = false

# Dev profile keeps debug info for flamegraph / lldb work.
[profile.dev]
debug = true
strip = false
