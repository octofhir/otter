# Test262 Runner Configuration for Otter VM
# This file configures the test262 conformance test runner.

# Path to the test262 directory (relative to project root)
# test262_path = "tests/test262"

# Pin test262 to a specific commit (optional)
# test262_commit = "abc123..."

# Default timeout in seconds per test
timeout_secs = 10

# Hard heap cap per test, in bytes (Otter analogue of Node's
# --max-old-space-size). Protects against pathological Array tests that
# would otherwise OOM the host. 0 = disabled. 512 MB is a comfortable
# headroom for normal tests while stopping the 32 GB Vec::resize path.
max_heap_bytes_per_test = 536870912

# Directory for saving results
# results_dir = "test262_results"

# Features to skip (tests requiring these features will be skipped).
# Skip ONLY non-final-stage proposals and features blocked by an
# external infra gap (regex engine). Everything that is Stage 4 /
# shipped and implementable in our own engine is intentionally NOT
# skipped here — those tests stay visible so the gap is tracked and
# closed (see the "implement, do not skip" list at the bottom).
skip_features = [
    # --- Module proposals / host module kinds not yet wired ---
    # import-assertions: deprecated legacy syntax, superseded by import
    # attributes (which are implemented).
    "import-assertions",
    "import-bytes",
    # import-defer (static `import defer * as`) is implemented; dynamic
    # `import.defer()` expression coverage is exposed by the
    # dynamic-import suite.
    "json-modules",
    "source-phase-imports",
    "source-phase-imports-module-source",

    # --- Realm-host proposals (Stage 3, need realm infrastructure) ---
    "ShadowRealm",
    "cross-realm",

    # --- Explicit resource management (using / await using, Stage 3) ---
    "explicit-resource-management",

    # --- Immutable ArrayBuffer (recent proposal, not finalized) ---
    "immutable-arraybuffer",

    # --- Iterator sequencing & joint iteration (Stage 2.7/3) ---
    "iterator-sequencing",
    "joint-iteration",

]

# Test flags to skip. Strictness is controlled by each test's
# frontmatter (`onlyStrict`, `noStrict`, `module`, `raw`) rather than
# by a global runner prelude.
skip_flags = []

# Test path patterns to ignore (tests matching these patterns will be skipped)
ignored_tests = [
    # SpiderMonkey staging tests use SM-specific harness functions (diff, etc.)
    "staging/sm/Math",

    # oxc parser rejects sloppy-mode call expression as assignment target (Annex B)
    "assignmenttargettype/callexpression",
    "assignmenttargettype/cover-callexpression",


    # Global object missing Object.prototype in prototype chain
    "decodeURIComponent/S15.1.3.2_A5.5",

    # Heavy decodeURIComponent iteration tests — too slow
    "decodeURIComponent/S15.1.3.2_A2.5_T1",
    "decodeURIComponent/S15.1.3.2_A1.10_T1",
    "decodeURIComponent/S15.1.3.2_A1.12_T1",
    "decodeURIComponent/S15.1.3.2_A1.2_T2",
    "decodeURIComponent/S15.1.3.2_A1.11_T1",
    "decodeURIComponent/S15.1.3.2_A1.2_T1",
    "decodeURIComponent/S15.1.3.2_A2.1_T1",
    "decodeURIComponent/S15.1.3.2_A1.11_T2",
    "decodeURIComponent/S15.1.3.2_A1.12_T2",

    # temporal_rs upstream bug: Duration.round with roundingIncrement for weeks
    # returns incorrect results. Tracked upstream, no fix in temporal_rs 0.2.0.
    "Duration/prototype/round/rounding-increment-relativeto",

    # Temporal PlainDateTime math precision — temporal_rs edge case
    "Temporal/PlainDateTime/datetime-math",

    # 65K eval() iterations per test — too slow (RegExp escape BMP exhaustive tests)
    "RegExp-trailing-escape-BMP",
    "RegExp-leading-escape-BMP",

    # HTML-style comments in new Function() — oxc parser doesn't support Annex B HTML comments
    "createdynfn-html-close-comment",
    "createdynfn-html-open-comment",
    "createdynfn-no-line-terminator-html-close-comment",

    # Legacy Sputnik Function.prototype.call cases exercise sloppy
    # dynamic Function semantics: global-this substitution for
    # null/undefined, primitive this boxing, and old Function()
    # constructor behavior. Keep them out of the strict-mode
    # conformance slice for now.
    "built-ins/Function/prototype/call/S15.3.4.4_A1_",
    "built-ins/Function/prototype/call/S15.3.4.4_A3_",
    "built-ins/Function/prototype/call/S15.3.4.4_A5_",
    "built-ins/Function/prototype/call/S15.3.4.4_A6_",
    "built-ins/Function/prototype/call/S15.3.4.4_A7_",

]

# Tests known to panic/crash the VM (will be skipped with a warning)
known_panics = [
    # Iterator-helpers re-entry tests recurse into the underlying
    # iterator from within the helper callback; the VM lacks a
    # "generator-already-running" guard so they exhaust the
    # native stack instead of throwing the spec TypeError.
    "Iterator/prototype/filter/throws-typeerror-when-generator-is-running",
    "Iterator/prototype/map/throws-typeerror-when-generator-is-running",
    "Iterator/prototype/flatMap/throws-typeerror-when-generator-is-running",
    "Iterator/prototype/take/throws-typeerror-when-generator-is-running",
    "Iterator/prototype/drop/throws-typeerror-when-generator-is-running",
    # Deep JS self-recursion: the engine recurses on the native (main)
    # thread and overflows the OS stack — aborting the whole batch —
    # instead of throwing a catchable RangeError. Until the interpreter
    # gains a call-depth guard on the pure-JS path, skip so the full
    # run completes. (This is the test that aborts the whole suite.)
    "staging/sm/extensions/recursion",
]
