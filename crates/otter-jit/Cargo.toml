[package]
name = "otter-jit"
version = "0.1.0"
edition = "2024"
description = "JIT compilation pipeline for Otter VM — Cranelift-based, cross-platform"
license = "MIT"

[features]
default = []
# Enable JIT support for the v2 (Ignition-style accumulator) bytecode
# path. Forwards the feature to `otter-vm` so the JIT can see the
# `Function::bytecode_v2()` / `Bytecode` / `OpcodeV2` symbols needed by
# the v2 baseline analyzer and emitter.
bytecode_v2 = ["otter-vm/bytecode_v2"]

[dependencies]
otter-vm = { path = "../otter-vm" }
thiserror.workspace = true
cranelift-codegen = "0.129.1"
cranelift-frontend = "0.129.1"
cranelift-jit = "0.129.1"
cranelift-module = "0.129.1"
cranelift-native = "0.129.1"
smallvec = "1"

[target.'cfg(target_arch = "x86_64")'.dependencies]
iced-x86 = { version = "1", default-features = false, features = ["decoder", "intel", "gas", "nasm"] }

[target.'cfg(target_arch = "aarch64")'.dependencies]
bad64 = "0.12"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
