name: Nightly Release

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts but skip publishing the release'
        type: boolean
        default: false

concurrency:
  group: nightly-release
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Compute nightly version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      suffix: ${{ steps.version.outputs.suffix }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      date: ${{ steps.version.outputs.date }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          DATE=$(date -u +'%Y%m%d')
          SHORT_SHA=$(git rev-parse --short=7 "$GITHUB_SHA")
          SUFFIX="${DATE}-${SHORT_SHA}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "tag=nightly-${SUFFIX}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: otter-linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: otter
            archive: tar.gz
          - name: otter-macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: otter
            archive: tar.gz
          - name: otter-macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: otter
            archive: tar.gz
          - name: otter-windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: otter.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --locked --release -p otter-cli --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        env:
          PKG_NAME: ${{ matrix.name }}-${{ needs.prepare.outputs.suffix }}
        run: |
          mkdir -p "dist/${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${PKG_NAME}/otter"
          tar -C dist -czf "dist/${PKG_NAME}.tar.gz" "${PKG_NAME}"
          shasum -a 256 "dist/${PKG_NAME}.tar.gz" > "dist/${PKG_NAME}.tar.gz.sha256"

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          PKG_NAME: ${{ matrix.name }}-${{ needs.prepare.outputs.suffix }}
        run: |
          New-Item -ItemType Directory -Force "dist/$env:PKG_NAME"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/$env:PKG_NAME/otter.exe"
          Compress-Archive -Path "dist/$env:PKG_NAME" -DestinationPath "dist/$env:PKG_NAME.zip" -Force
          Get-FileHash "dist/$env:PKG_NAME.zip" -Algorithm SHA256 |
            ForEach-Object { $_.Hash.ToLower() + '  ' + "$env:PKG_NAME.zip" } |
            Set-Content "dist/$env:PKG_NAME.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ needs.prepare.outputs.suffix }}
          path: |
            dist/${{ matrix.name }}-${{ needs.prepare.outputs.suffix }}.${{ matrix.archive }}
            dist/${{ matrix.name }}-${{ needs.prepare.outputs.suffix }}.${{ matrix.archive }}.sha256

  release:
    name: Publish nightly
    needs: [prepare, build]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
    runs-on: ubuntu-latest
    env:
      NIGHTLY_TAG: ${{ needs.prepare.outputs.tag }}
      ROLLING_TAG: nightly
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f "$NIGHTLY_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$NIGHTLY_TAG"
          gh release create "$NIGHTLY_TAG" artifacts/* \
            --title "Otter Nightly ${NIGHTLY_TAG#nightly-}" \
            --notes "Automated nightly build from ${GITHUB_SHA}." \
            --prerelease \
            --latest=false

      - name: Update rolling nightly pointer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$ROLLING_TAG" --yes --cleanup-tag || true
          git tag -f "$ROLLING_TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$ROLLING_TAG"
          gh release create "$ROLLING_TAG" artifacts/* \
            --title "Otter Nightly (latest)" \
            --notes "Rolling pointer to most recent nightly: ${NIGHTLY_TAG} (${GITHUB_SHA})." \
            --prerelease \
            --latest=false
