# Test262 Runner Configuration for Otter VM
# This file configures the test262 conformance test runner.

# Path to the test262 directory (relative to project root)
# test262_path = "tests/test262"

# Pin test262 to a specific commit (optional)
# test262_commit = "abc123..."

# Default timeout in seconds per test
timeout_secs = 10

# Hard heap cap per test, in bytes (Otter analogue of Node's
# --max-old-space-size). Protects against pathological Array tests that
# would otherwise OOM the host. 0 = disabled. 512 MB is a comfortable
# headroom for normal tests while stopping the 32 GB Vec::resize path.
max_heap_bytes_per_test = 536870912

# Directory for saving results
# results_dir = "test262_results"

# Features to skip (tests requiring these features will be skipped).
# Only skip features we truly cannot support (infra gaps or active proposals).
skip_features = [
    # Atomics & shared memory (requires SharedArrayBuffer infra)
    "Atomics",
    "Atomics.pause",
    "SharedArrayBuffer",

    # Decorators (Stage 3, not yet standardized)
    "decorators",

    # Module system (requires module loader in test262 harness)
    "import-assertions",
    "import-attributes",
    "import-bytes",
    "import-defer",
    "dynamic-import",
    "import.meta",
    "json-modules",
    "source-phase-imports",
    "source-phase-imports-module-source",
    "export-star-as-namespace-from-module",
    "top-level-await",

    # FinalizationRegistry / WeakRef: host-gc-required tests need $262.gc()
    # to reliably trigger collection + cleanup callbacks
    "host-gc-required",

    # ShadowRealm (proposal)
    "ShadowRealm",
    "cross-realm",

    # Explicit resource management (using/await using)
    "explicit-resource-management",

    # Tail calls (engine architecture)
    "tail-call-optimization",

    # Resizable / immutable ArrayBuffer (not yet implemented)
    "resizable-arraybuffer",
    "arraybuffer-transfer",
    "immutable-arraybuffer",

    # Iterator sequencing & joint iteration (ES2025, not yet implemented)
    "iterator-sequencing",
    "joint-iteration",

    # Hashbang (parser feature)
    "hashbang",

    # RegExp modifiers (ES2025 Stage 4, not yet implemented in regress crate)
    "regexp-modifiers",

    # Duplicate named capture groups (ES2025, not yet in regress crate)
    "regexp-duplicate-named-groups",

    # Active proposals (not yet standardized)
    "Array.fromAsync",
    "Error.isError",
    "Float16Array",
    "Math.sumPrecise",
    "RegExp.escape",
    "upsert",
    "uint8array-base64",
    "import-bytes",
    "import-defer",
]

# Test path patterns to ignore (tests matching these patterns will be skipped)
ignored_tests = [
    # SpiderMonkey staging tests use SM-specific harness functions (diff, etc.)
    "staging/sm/Math",

    # oxc parser rejects sloppy-mode call expression as assignment target (Annex B)
    "assignmenttargettype/callexpression",
    "assignmenttargettype/cover-callexpression",

    # yield* delegation not yet implemented (missing throw/return forwarding)
    "yield/star-iterable-throw-emulates-undefined",
    "yield/star-iterable-return-emulates-undefined",

    # Global object missing Object.prototype in prototype chain
    "decodeURIComponent/S15.1.3.2_A5.5",

    # Heavy decodeURIComponent iteration tests — too slow
    "decodeURIComponent/S15.1.3.2_A2.5_T1",
    "decodeURIComponent/S15.1.3.2_A1.10_T1",
    "decodeURIComponent/S15.1.3.2_A1.12_T1",
    "decodeURIComponent/S15.1.3.2_A1.2_T2",
    "decodeURIComponent/S15.1.3.2_A1.11_T1",
    "decodeURIComponent/S15.1.3.2_A1.2_T1",
    "decodeURIComponent/S15.1.3.2_A2.1_T1",
    "decodeURIComponent/S15.1.3.2_A1.11_T2",
    "decodeURIComponent/S15.1.3.2_A1.12_T2",

    # temporal_rs upstream bug: Duration.round with roundingIncrement for weeks
    # returns incorrect results. Tracked upstream, no fix in temporal_rs 0.2.0.
    "Duration/prototype/round/rounding-increment-relativeto",

    # Annex B \c ClassControlLetter escape in character class — regress limitation
    "literals/regexp/class-escape",

    # Tests use legacy string escapes ("\d", "\x", "\ ") without noStrict flag — oxc rejects in strict mode
    "RegExp/S15.10.3.1_A2_T1",
    "RegExp/S15.10.2.13_A1_T10",
    "RegExp/S15.10.2.8_A3_T24",

    # Regress crate doesn't support exotic Unicode ID_Start/ID_Continue in group names
    "named-groups/unicode-property-names-valid",
    "named-groups/unicode-property-names",
    "named-groups/non-unicode-property-names",
    "named-groups/unicode-references",

    # Regress crate doesn't validate Annex B restrictions in unicode mode
    "RegExp/unicode_restricted_identity_escape_c",
    "RegExp/unicode_restricted_octal_escape",
    "RegExp/S15.10.2.15_A1_T34",

    # Temporal PlainDateTime math precision — temporal_rs edge case
    "Temporal/PlainDateTime/datetime-math",

    # 65K eval() iterations per test — too slow (RegExp escape BMP exhaustive tests)
    "RegExp-trailing-escape-BMP",
    "RegExp-leading-escape-BMP",

    # HTML-style comments in new Function() — oxc parser doesn't support Annex B HTML comments
    "createdynfn-html-close-comment",
    "createdynfn-html-open-comment",
    "createdynfn-no-line-terminator-html-close-comment",
]

# Tests known to panic/crash the VM (will be skipped with a warning)
known_panics = [
    # Stack overflow in regress crate with 200 nested parens
    "S15.10.2.8_A3_T15",
    "S15.10.2.8_A3_T16",
    # Unicode property-escapes generated tests build huge strings, cause OOM/GC crash
    "RegExp/property-escapes/generated",
]
