[package]
name = "otter-jit"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "Baseline JIT for the Otter VM: Sparkplug-style template macro-assembler (bytecode → machine code) with no IR, no deopt, and reused interpreter-frame rooting."

# `unsafe_code` ban lifted for this crate (mirrors otter-gc): a JIT must mmap
# W^X executable memory and transmute emitted bytes to function pointers. All
# `unsafe` is encapsulated here behind a safe API; otter-vm keeps the workspace
# `forbid(unsafe_code)` and reaches the JIT through a trait hook (no cycle).
# See JIT_DESIGN.md §3.2.
[lints.rust]
missing_docs = "deny"

[lints.clippy]
all = { level = "deny", priority = -1 }

[dependencies]
otter-bytecode = { workspace = true }
otter-vm = { workspace = true }
rustc-hash = { workspace = true }
# Template macro-assembler chosen by the §3.2 prototype gate (M1/M2 confirmed
# toolchain + latency + codegen on arm64). x86_64 emitter follows arm64.
dynasm = "3"
dynasmrt = "3"
# Cranelift optimizing backend: a second emit path lowering the same typed SSA
# graph the dynasm tier consumes. Cranelift owns instruction selection and
# register allocation; the typed SSA graph, deopt frame states, and OSR entries
# stay Otter-owned. Pinned to an exact version because codegen output can shift
# between Cranelift releases, so an upgrade is a gated change
# (CRANELIFT_TIER2.md §9). These are otter-jit-only deps — no new edge into the
# parked compatibility shims (CLAUDE.md rule).
cranelift-codegen = "=0.133.1"
cranelift-frontend = "=0.133.1"
cranelift-jit = "=0.133.1"
cranelift-module = "=0.133.1"
cranelift-native = "=0.133.1"

[dev-dependencies]
