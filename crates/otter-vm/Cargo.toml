[package]
name = "otter-vm"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "Interpreter and value model for the Otter foundation engine."

# `unsafe_code` ban lifted for this crate only: the register-window frame stack
# (flat `Value` stack, JIT-built callee windows) needs raw-pointer windows so
# compiled code sets up calls without a Rust bridge. All other `crates/*`
# (otter-nodejs, otter-node-compat, …) keep the workspace `forbid(unsafe_code)`.
# Mirrors the workspace lint set otherwise.
[lints.rust]
missing_docs = "deny"

[lints.clippy]
all = { level = "deny", priority = -1 }
result_large_err = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
arc_with_non_send_sync = "allow"
# `VmError` is a large enum with drop glue. `.ok_or(VmError::X)` eagerly builds
# and drops it on the success path — drop_in_place<VmError> measured several
# percent of hot dispatch/call self-time — so the engine uses `.ok_or_else`
# even for fieldless variants. The lint's "cheap value" heuristic does not model
# that, so allow it here (the perf win is real and measured).
unnecessary_lazy_evaluations = "allow"

[dependencies]
otter-bytecode = { workspace = true }
otter-gc = { workspace = true }
otter-regex = { workspace = true }
otter-macros = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
smallvec = { workspace = true }
indexmap = { workspace = true }
elsa = { workspace = true }
rustc-hash = { workspace = true }
thiserror = { workspace = true }
num-bigint = { workspace = true }
num-traits = { workspace = true }
temporal_rs = { workspace = true }
icu_collator = { workspace = true }
icu_normalizer = { workspace = true }
icu_decimal = { workspace = true }
icu_datetime = { workspace = true }
icu_locale = { workspace = true }
icu_calendar = { workspace = true }
icu_time = { workspace = true }
icu_experimental = { workspace = true }
fixed_decimal = { workspace = true }
writeable = { workspace = true }
tinystr = "0.8"
static_assertions = "1.1"

[dev-dependencies]
criterion = { workspace = true }
trybuild = "1.0"

[[bench]]
name = "dispatch"
harness = false

[[bench]]
name = "bootstrap"
harness = false

[[bench]]
name = "json_scan"
harness = false

[[bench]]
name = "string_search"
harness = false

[[bench]]
name = "property_ic"
harness = false

[[bench]]
name = "property_gc"
harness = false
