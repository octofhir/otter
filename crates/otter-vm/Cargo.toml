[package]
name = "otter-vm"
version = "0.1.0"
edition = "2024"
description = "VM backend for Otter"
license = "MIT"

[lints.rust]
unsafe_code = "forbid"
warnings = "deny"

[lints.clippy]
all = "deny"

[dependencies]
otter-gc = { path = "../otter-gc" }
oxc_allocator = "0.122"
oxc_ast = "0.122"
oxc_parser = "0.122"
oxc_span = "0.122"
tokio = { version = "1", features = ["rt", "time", "sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "time", "sync", "macros"] }
