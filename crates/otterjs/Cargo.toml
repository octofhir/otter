[package]
name = "otterjs"
version = "0.1.2"
edition = "2024"
description = "Otter CLI - A fast TypeScript/JavaScript runtime"
license = "MIT"
autotests = true
repository = "https://github.com/octofhir/otter"
homepage = "https://github.com/octofhir/otter"
keywords = ["typescript", "javascript", "runtime", "cli"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"

[[bin]]
name = "otter"
path = "src/main.rs"
test = false

[features]
default = []
# Enable v2 (Ignition-style accumulator) bytecode path end-to-end:
# interpreter dispatch_v2, JIT x21-pinned baseline, transpile hook
# gated by OTTER_V2_TRANSPILE env var.
bytecode_v2 = ["otter-runtime/bytecode_v2"]

[dependencies]
# Target runtime stack
otter-nodejs = { path = "../otter-nodejs", version = "0.1.0" }
otter-modules = { path = "../otter-modules", version = "0.1.0" }
otter-web = { path = "../otter-web", version = "0.1.0" }
otter-runtime = { path = "../otter-runtime", version = "0.1.0" }
otter-pm = { path = "../otter-pm", version = "0.1.1" }

# CLI and utilities
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
oxc-miette = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }
toml = "0.9"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
atty = "0.2"

[dev-dependencies]
assert_cmd = "2"
insta = { version = "1", features = ["filters"] }
tempfile = "3"
