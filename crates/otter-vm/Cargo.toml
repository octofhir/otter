[package]
name = "otter-vm"
version = "0.1.0"
edition = "2024"
description = "VM backend for Otter"
license = "MIT"

[lints.rust]
unsafe_code = "forbid"
warnings = "deny"

[lints.clippy]
all = "deny"

[features]
default = []
# Enable the in-progress Ignition-style bytecode ISA (Phase C of
# JIT_REFACTOR_PLAN.md). Off by default — the runtime still ships v1.
# Turning this on just compiles the `bytecode_v2` module and its unit
# tests; no interpreter or compiler changes until Phase 2/3 land.
bytecode_v2 = []

[dependencies]
otter-gc = { path = "../otter-gc" }
otter-macros = { path = "../otter-macros" }
thiserror.workspace = true
oxc_allocator = "0.123"
oxc_ast = "0.123"
oxc_ast_visit = "0.123"
oxc_parser = "0.123"
oxc_span = "0.123"
oxc_transformer = "0.123"
oxc_codegen = "0.123"
oxc_sourcemap = "6.1.1"
oxc_semantic = "0.123"
getrandom = "0.2"
serde = "1"
serde_json = "1"
itoa = "1"
ryu = "1"
tokio = { version = "1", features = ["rt", "time", "sync"] }
regress = { version = "0.11.1", features = ["utf16"] }
chrono = "0.4"
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"
temporal_rs = { version = "0.2.3", features = ["sys-local"] }
unicode-normalization = "0.1"
fixed_decimal = { version = "0.7.1", features = ["ryu"] }
icu_decimal = "2.1.1"
icu_locale = "2.1.1"
writeable = "0.6.2"
icu_collator = "2.1"
icu_plurals = "2.1"
icu_datetime = "2.1"
icu_calendar = "2.1"
icu_time = "2.1"
icu_list = "2.1"
icu_segmenter = "2.1"
icu_experimental = { version = "0.5", features = ["compiled_data"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "time", "sync", "macros"] }
