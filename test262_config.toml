# Test262 Runner Configuration for Otter VM
# This file configures the test262 conformance test runner.

# Path to the test262 directory (relative to project root)
# test262_path = "tests/test262"

# Pin test262 to a specific commit (optional)
# test262_commit = "abc123..."

# Default timeout in seconds per test
timeout_secs = 10

# Hard heap cap per test, in bytes (Otter analogue of Node's
# --max-old-space-size). Protects against pathological Array tests that
# would otherwise OOM the host. 0 = disabled. 512 MB is a comfortable
# headroom for normal tests while stopping the 32 GB Vec::resize path.
max_heap_bytes_per_test = 536870912

# Directory for saving results
# results_dir = "test262_results"

# Features to skip (tests requiring these features will be skipped).
#
# POLICY: skip ONLY features that are not yet part of ECMA-262 / ECMA-402
# — i.e. live TC39 proposals (pre-Stage-4) and legacy syntax that the
# standard has removed. Everything that is shipped in the standard is
# intentionally NOT skipped here, even if currently failing, so the gap
# stays visible and gets fixed rather than hidden.
#
# NOTE: `import-defer` is implemented (static `import defer * as` plus the
# dynamic `import.defer()` expression) and is therefore deliberately
# absent from this list.
skip_features = [
    # --- Module proposals / host module kinds not yet standardized ---
    # import-assertions: legacy `assert { type: ... }` syntax, removed
    # from the spec and superseded by import attributes (implemented).
    "import-assertions",
    "import-bytes",
    "json-modules",
    "source-phase-imports",
    "source-phase-imports-module-source",

    # --- Realm-host proposals (Stage 3, need realm infrastructure) ---
    "ShadowRealm",
    "cross-realm",

    # --- Explicit resource management (using / await using, Stage 3) ---
    "explicit-resource-management",

    # --- Immutable ArrayBuffer (Stage 3, not finalized) ---
    "immutable-arraybuffer",

    # --- Iterator sequencing & joint iteration (Stage 2.7/3) ---
    "iterator-sequencing",
    "joint-iteration",

    # --- Decorators (Stage 3, not yet in ECMA-262) ---
    "decorators",
]

# Test flags to skip. Strictness is controlled by each test's
# frontmatter (`onlyStrict`, `noStrict`, `module`, `raw`) rather than
# by a global runner prelude.
skip_flags = []

# Test path patterns to ignore.
#
# POLICY: the only acceptable reason for a path ignore is a CONCRETE
# upstream bug in a third-party crate we depend on (which we cannot fix
# from here), each documented with the crate + symptom. Engine gaps,
# parser limitations, and "too slow" tests are NOT hidden here — they
# stay visible as failures/timeouts and are tracked as fix targets.
ignored_tests = [
    # temporal_rs upstream bug: Duration.round with roundingIncrement for
    # weeks returns incorrect results. No fix in temporal_rs 0.2.0.
    "Duration/prototype/round/rounding-increment-relativeto",

    # temporal_rs upstream bug: PlainDateTime math precision edge case.
    "Temporal/PlainDateTime/datetime-math",
]

# Tests known to panic/crash the VM (skipped with a warning).
#
# These are engine bugs to FIX, not permanent exclusions — each one
# aborts the host process today and is listed only so a full run can
# complete. Remove an entry as soon as the underlying guard lands.
known_panics = [
    # Iterator-helpers re-entry tests recurse into the underlying
    # iterator from within the helper callback; the VM lacks a
    # "generator-already-running" guard so they exhaust the
    # native stack instead of throwing the spec TypeError.
    "Iterator/prototype/filter/throws-typeerror-when-generator-is-running",
    "Iterator/prototype/map/throws-typeerror-when-generator-is-running",
    "Iterator/prototype/flatMap/throws-typeerror-when-generator-is-running",
    "Iterator/prototype/take/throws-typeerror-when-generator-is-running",
    "Iterator/prototype/drop/throws-typeerror-when-generator-is-running",
    # Deep JS self-recursion through generator resumption overflows the
    # native (main) thread stack — the per-frame bytecode depth guard
    # does not bound the Rust frames added by generator resume / for-of
    # dispatch. Needs a native-stack guard on that path.
    "staging/sm/extensions/recursion",
]
