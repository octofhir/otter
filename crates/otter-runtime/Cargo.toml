[package]
name = "otter-runtime"
version = "0.1.0"
edition = "2024"
description = "Public API and execution runtime for the Otter JS engine"
license = "MIT"

[lints.rust]
unsafe_code = "forbid"
warnings = "deny"

[lints.clippy]
all = "deny"

[features]
default = []
# Enable v2 (Ignition-style accumulator) bytecode path. Forwards to
# both otter-vm (dispatch_v2, Activation::accumulator, transpiler) and
# otter-jit (x21-pinned baseline analyzer+emitter, pipeline probe).
bytecode_v2 = ["otter-vm/bytecode_v2", "otter-jit/bytecode_v2"]

[dependencies]
dirs = "6.0"
dunce = "1"
md5 = "0.8"
otter-macros = { path = "../otter-macros" }
otter-jit = { path = "../otter-jit" }
otter-profiler = { path = "../otter-profiler" }
otter-vm = { path = "../otter-vm" }
oxc_allocator = "0.123"
oxc_ast = "0.123"
oxc_parser = "0.123"
oxc_resolver = "11.16"
oxc_span = "0.123"
oxc-miette = { workspace = true }
reqwest = { version = "0.13", features = ["blocking", "rustls"], default-features = false }
serde_json = "1"
thiserror.workspace = true
# S7-b: tokio sleep used by `run_module_async`/`run_entry_specifier_async`
# so embedders inside an outer tokio runtime do not need spawn_blocking.
tokio = { version = "1", features = ["time", "rt"] }

[dev-dependencies]
# S7-b regression test exercises `run_module_async` from a multi-thread
# tokio reactor; needs macros for `tokio::join!` and the multi-thread
# scheduler so the two async runs can overlap.
tokio = { version = "1", features = ["time", "rt", "rt-multi-thread", "macros"] }
# O3 cpu_profiler smoke test writes profile output to a tempdir.
tempfile = "3"

[[bin]]
name = "otter-newvm"
path = "src/bin/otter_newvm.rs"
