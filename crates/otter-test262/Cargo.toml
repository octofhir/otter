[package]
name = "otter-test262"
version = "0.0.0"
edition.workspace = true
publish = false
license.workspace = true
description = "Test262 conformance runner for the active Otter stack."

[lints]
workspace = true

[lib]
name = "otter_test262"
path = "src/lib.rs"

[[bin]]
name = "otter-test262"
path = "src/main.rs"

[dependencies]
# Active runtime / VM surface.
otter-runtime = { workspace = true }
otter-vm      = { workspace = true }
smallvec     = { workspace = true }

# Parsing helpers (frontmatter + reports).
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_yaml  = { workspace = true }
toml        = { workspace = true }

# CLI + traversal. The test262 driver uses short-lived worker
# processes for isolation instead of in-process parallelism.
clap        = { workspace = true }
ignore      = "0.4"
indicatif   = "0.18"
ctrlc       = "3"
sysinfo     = { workspace = true }

# Errors.
anyhow      = { workspace = true }
thiserror   = { workspace = true }

# Module-flagged tests need an on-disk entry; we stage them in a
# scratch directory.
tempfile    = "3"

# RFC-3339 timestamps for baseline `ran_at` field.
chrono      = { workspace = true }
