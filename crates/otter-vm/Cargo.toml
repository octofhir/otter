[package]
name = "otter-vm"
version = "0.1.0"
edition = "2024"
description = "VM backend for Otter"
license = "MIT"

[lints.rust]
unsafe_code = "forbid"
warnings = "deny"

[lints.clippy]
all = "deny"

[dependencies]
otter-gc = { path = "../otter-gc" }
oxc_allocator = "0.123"
oxc_ast = "0.123"
oxc_parser = "0.123"
oxc_span = "0.123"
getrandom = "0.2"
serde = "1"
serde_json = "1"
itoa = "1"
ryu = "1"
tokio = { version = "1", features = ["rt", "time", "sync"] }
regress = { version = "0.11.1", features = ["utf16"] }
chrono = "0.4"
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"
temporal_rs = { version = "0.2.3", features = ["sys-local"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "time", "sync", "macros"] }
