[package]
name = "otterjs"
version = "0.1.2"
edition = "2024"
description = "Otter CLI - A fast TypeScript/JavaScript runtime"
license = "MIT"
autotests = false
repository = "https://github.com/octofhir/otter"
homepage = "https://github.com/octofhir/otter"
keywords = ["typescript", "javascript", "runtime", "cli"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"

[[bin]]
name = "otter"
path = "src/main.rs"
test = false

[dependencies]
# Target runtime stack
otter-runtime = { path = "../otter-runtime", version = "0.1.0" }
otter-pm = { path = "../otter-pm", version = "0.1.1" }

# CLI and utilities
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
toml = "0.9"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
atty = "0.2"
