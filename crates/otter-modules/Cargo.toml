[package]
name = "otter-modules"
version = "0.1.0"
edition = "2024"
description = "Otter-specific hosted modules for the new runtime stack"
license = "MIT"
build = "build.rs"

[dependencies]
libffi = "4"
libloading = "0.8"
otter-runtime = { path = "../otter-runtime" }
otter-vm = { path = "../otter-vm" }
redb = "3"
rusqlite = { version = "0.32", features = ["bundled"] }
serde_json = "1"
thiserror.workspace = true
