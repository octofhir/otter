[package]
name = "otter-jit"
version = "0.1.0"
edition = "2024"
description = "JIT compilation pipeline for Otter VM — Cranelift-based, cross-platform"
license = "MIT"

[dependencies]
otter-vm = { path = "../otter-vm" }
thiserror.workspace = true
cranelift-codegen = "0.129.1"
cranelift-frontend = "0.129.1"
cranelift-jit = "0.129.1"
cranelift-module = "0.129.1"
cranelift-native = "0.129.1"
smallvec = "1"

[target.'cfg(target_arch = "x86_64")'.dependencies]
iced-x86 = { version = "1", default-features = false, features = ["decoder", "intel", "gas", "nasm"] }

[target.'cfg(target_arch = "aarch64")'.dependencies]
bad64 = "0.12"
