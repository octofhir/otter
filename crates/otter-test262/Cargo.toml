[package]
name = "otter-test262"
version = "0.1.0"
edition = "2024"
description = "Test262 runner for Otter VM"
license = "MIT"
autotests = false
autobins = false
publish = false

[lib]
test = false
doctest = false

[[bin]]
name = "test262"
path = "src/main.rs"
test = false

[[bin]]
name = "gen-conformance"
path = "src/bin/gen_conformance.rs"
test = false

[[bin]]
name = "merge-reports"
path = "src/bin/merge_reports.rs"
test = false

[dependencies]
otter-runtime = { path = "../otter-runtime", version = "0.1.0" }

thiserror.workspace = true
oxc-miette = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.9"
chrono = { version = "0.4", features = ["serde"] }
walkdir = "2"
clap = { version = "4", features = ["derive"] }
colored = "3"
indicatif = "0.18"
tokio = { version = "1.37", features = ["rt-multi-thread", "macros", "sync", "time"] }
futures = "0.3.31"

[dev-dependencies]
