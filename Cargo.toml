[workspace]
resolver = "3"
members = [
    "crates/otter-gc",
    "crates/otter-runtime",
    "crates/otter-vm",
    "crates/otter-jit",
    "crates/otter-nodejs",
    "crates/otter-node-compat",
    "crates/otter-modules",
    "crates/otter-web",
    "crates/otter-pm",
    "crates/otterjs",
]

[workspace.dependencies]
thiserror = "2"
oxc_transformer = "0.123"
oxc_codegen = "0.123"
oxc_sourcemap = "6.1.1"
oxc-miette = { version = "2.7", features = ["fancy"] }

# Optimized release profile for minimal startup time
[profile.release]
lto = "thin"           # Link-time optimization (improves code layout)
codegen-units = 1      # Single codegen unit (better inlining, worse compile time)
strip = false          # Keep symbols for profiling
# debug = true           # Include debug info for flamegraph
panic = "abort"        # No unwinding (smaller binary)
opt-level = 3          # Maximum optimization

# Fast release for development iteration
[profile.release-fast]
inherits = "release"
lto = false
codegen-units = 16
strip = false

# Profile for flamegraph with debug symbols
[profile.dev]
debug = true
strip = false
