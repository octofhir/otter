# Node.js Compatibility Test Configuration
#
# Tests are fetched from the official nodejs/node repo (branch `main`) via:
#   bash scripts/fetch-node-tests.sh
#
# Every file in tests/node-compat/node/test/{parallel,sequential} runs, so the
# report states the real number of unsupported behaviours. There is no
# selection or skip list: a test Otter cannot pass is a failure to fix, not a
# test to hide. Modules are derived from Node's own file naming
# (test-<module>-*.js).

timeout_secs = 10

# Timeout overrides for modules whose official tests are legitimately slower
# than the global budget.
[module_timeouts]
url = 60

[[integration_tests]]
module = "napi"
name = "stable-c-abi"
program = "cargo"
args = [
    "test", "-p", "otter-cli", "--test", "node_napi",
    "node_api_addon_executes_stable_c_abi", "--", "--exact",
]
timeout_secs = 300

[[integration_tests]]
module = "napi"
name = "capabilities"
program = "cargo"
args = [
    "test", "-p", "otter-cli", "--test", "node_napi",
    "node_api_addon_requires_read_and_ffi_capabilities", "--", "--exact",
]
timeout_secs = 300

[[integration_tests]]
module = "napi"
name = "constructor-registration"
program = "cargo"
args = [
    "test", "-p", "otter-cli", "--test", "node_napi",
    "node_api_addon_supports_constructor_registration", "--", "--exact",
]
timeout_secs = 300
